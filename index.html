<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyCraft Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .produto-card img {
            width: 100% !important;
            height: 200px !important;
            object-fit: cover !important;
            border-radius: 10px !important;
            margin-bottom: 1rem !important;
            display: block !important;
        }
        
        .btn-detalhes {
            width: 100%;
            padding: 0.6rem;
            background: transparent;
            border: 1px solid var(--roxo, #8B5CF6);
            color: var(--texto, #E2E8F0);
            border-radius: 8px;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .btn-detalhes:hover {
            background: var(--roxo, #8B5CF6) !important;
            color: white !important;
        }
        
        #link-perfil {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #link-perfil img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--amarelo);
        }
        
        .produto-preco-original {
            text-decoration: line-through;
            color: var(--texto-cinza);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }
        .produto-preco-promo {
            color: #ef4444;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .produto-categoria {
            display: inline-block;
            background: var(--roxo);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .badge-promo {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ef4444;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        /* Modal detalhes */
        .modal-detalhes-fundo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .modal-detalhes-box {
            background: var(--card, #1A1A2E);
            border: 2px solid var(--roxo, #8B5CF6);
            border-radius: 15px;
            padding: 2.5rem;
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-detalhes-titulo {
            color: var(--amarelo, #F59E0B);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2rem;
        }
        .modal-detalhes-conteudo {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }
        .modal-detalhes-imagem {
            width: 350px;
            height: 350px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .modal-detalhes-placeholder {
            width: 350px;
            height: 350px;
            border-radius: 10px;
            background: linear-gradient(45deg, var(--roxo, #8B5CF6), var(--verde, #10B981));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            flex-shrink: 0;
        }
        .modal-detalhes-texto {
            color: var(--texto, #E2E8F0);
            font-size: 1.1rem;
            line-height: 1.8;
            flex: 1;
            white-space: pre-line;
        }
        .modal-detalhes-rodape {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #333;
        }
        .modal-detalhes-preco {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--verde, #10B981);
        }
        .modal-detalhes-fechar {
            background: var(--roxo, #8B5CF6);
            color: white;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-detalhes-fechar:hover {
            background: var(--roxo-escuro, #6D28D9);
            transform: scale(1.05);
        }
        
        @media (max-width: 700px) {
            .modal-detalhes-fundo { padding: 1rem; }
            .modal-detalhes-box { padding: 1.5rem; }
            .modal-detalhes-conteudo { flex-direction: column; align-items: center; }
            .modal-detalhes-imagem, .modal-detalhes-placeholder { width: 100%; height: 250px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1>🛒 ReyCraft Shop</h1>
        </div>
        <nav class="nav">
            <a href="index.html">🏠 Home</a>
            <a href="carrinho.html">🛒 Carrinho <span id="contador-carrinho">(0)</span></a>
            <a href="perfil.html" id="link-perfil">
                <span id="perfil-nome">👤 Perfil</span>
            </a>
        </nav>
    </header>

    <div class="container">
        <h2>🔥 Produtos em Destaque</h2>
        <div class="grid-produtos" id="lista-produtos"></div>
    </div>

    <a href="admin/login.html" class="btn-admin">⚙️ Admin</a>

    <script>
        // ========== CORES ==========
        (function() {
            try {
                var config = JSON.parse(localStorage.getItem('config_loja'));
                if (config && config.corRoxo) {
                    var style = document.createElement('style');
                    style.textContent = 
                        ':root {' +
                        '--roxo: ' + config.corRoxo + ' !important;' +
                        '--roxo-escuro: ' + config.corRoxo + 'cc !important;' +
                        '--verde: ' + config.corVerde + ' !important;' +
                        '--verde-escuro: ' + config.corVerde + 'cc !important;' +
                        '--amarelo: ' + config.corAmarelo + ' !important;' +
                        '--amarelo-escuro: ' + config.corAmarelo + 'cc !important;' +
                        '}';
                    document.head.appendChild(style);
                    
                    if (config.bgImagem) {
                        var fundo = document.createElement('div');
                        fundo.style.cssText = 
                            'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;' +
                            'background-image:url(' + config.bgImagem + ');' +
                            'background-size:' + (config.bgModo || 'cover') + ';' +
                            'background-position:' + (config.bgPosicao || 'center') + ';' +
                            'opacity:' + ((config.bgOpacidade || 50) / 100) + ';';
                        document.body.insertBefore(fundo, document.body.firstChild);
                    }
                    
                    if (config.favicon) {
                        var link = document.createElement('link');
                        link.rel = 'icon';
                        link.href = config.favicon;
                        document.head.appendChild(link);
                    }
                }
            } catch(e) {}
        })();

        // ========== PERFIL NO HEADER ==========
        (function() {
            var usuario = JSON.parse(localStorage.getItem('usuario_discord'));
            var perfilNome = document.getElementById('perfil-nome');
            if (usuario && perfilNome) {
                perfilNome.innerHTML = '<img src="' + usuario.avatar + '" style="width:30px;height:30px;border-radius:50%;object-fit:cover;vertical-align:middle;"> ' + (usuario.global_name || usuario.username);
            }
        })();

        // ========== DADOS ==========
        var produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        var carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        if (!carrinho || typeof carrinho === 'string') { carrinho = []; localStorage.setItem('carrinho', '[]'); }

        function salvarCarrinho() {
            try {
                localStorage.setItem('carrinho', JSON.stringify(carrinho));
                atualizarContador();
            } catch(e) {
                alert('⚠️ Erro ao salvar carrinho! Armazenamento cheio.');
            }
        }

        function adicionarAoCarrinho(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            if (!produto) { alert('Erro: produto não encontrado!'); return; }
            
            // Usar preço promocional se existir
            var precoFinal = produto.precoPromo && Number(produto.precoPromo) < Number(produto.preco) 
                ? Number(produto.precoPromo) 
                : Number(produto.preco);
            
            var item = carrinho.find(function(i) { return i.id === id; });
            if (item) {
                item.quantidade++;
            } else {
                carrinho.push({
                    id: produto.id,
                    nome: produto.nome,
                    preco: precoFinal,
                    emoji: produto.emoji || '',
                    imagem: produto.imagem || '',
                    categoria: produto.categoria || '',
                    quantidade: 1
                });
            }
            
            salvarCarrinho();
            alert(produto.nome + ' adicionado ao carrinho! 🛒');
        }

        function atualizarContador() {
            var total = 0;
            carrinho.forEach(function(item) { total += item.quantidade; });
            var contador = document.getElementById('contador-carrinho');
            if (contador) contador.textContent = '(' + total + ')';
        }

        function mostrarDetalhes(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            if (!produto) return;
            
            var antigo = document.querySelector('.modal-detalhes-fundo');
            if (antigo) antigo.remove();
            
            var modal = document.createElement('div');
            modal.className = 'modal-detalhes-fundo';
            
            var imagemHtml = produto.imagem 
                ? '<img src="' + produto.imagem + '" class="modal-detalhes-imagem" alt="' + produto.nome + '">'
                : '<div class="modal-detalhes-placeholder">' + (produto.emoji || '📦') + '</div>';
            
            var precoHtml = '';
            if (produto.precoPromo && Number(produto.precoPromo) < Number(produto.preco)) {
                precoHtml = '<span style="text-decoration:line-through;color:var(--texto-cinza);font-size:1.2rem;">R$ ' + Number(produto.preco).toFixed(2) + '</span> ' +
                            '<span style="color:#ef4444;">R$ ' + Number(produto.precoPromo).toFixed(2) + '</span>';
            } else {
                precoHtml = 'R$ ' + Number(produto.preco).toFixed(2);
            }
            
            modal.innerHTML = 
                '<div class="modal-detalhes-box">' +
                    '<div class="modal-detalhes-titulo">' + produto.nome + '</div>' +
                    '<div class="modal-detalhes-conteudo">' +
                        imagemHtml +
                        '<div class="modal-detalhes-texto">' + (produto.descricao || 'Sem descrição disponível.') + '</div>' +
                    '</div>' +
                    '<div class="modal-detalhes-rodape">' +
                        '<div class="modal-detalhes-preco">' + precoHtml + '</div>' +
                        '<button class="modal-detalhes-fechar" onclick="this.closest(\'.modal-detalhes-fundo\').remove()">Fechar</button>' +
                    '</div>' +
                '</div>';
            
            document.body.appendChild(modal);
            modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
        }

        function renderizarProdutos() {
            var container = document.getElementById('lista-produtos');
            if (!container) return;
            
            if (produtos.length === 0) {
                container.innerHTML = '<div class="loja-vazia" style="grid-column: 1 / -1;"><div class="icone">📦</div><h2>Loja Vazia</h2><p>O administrador ainda não adicionou produtos.</p></div>';
                return;
            }
            
            container.innerHTML = '';
            
            produtos.forEach(function(produto) {
                var card = document.createElement('div');
                card.className = 'produto-card';
                card.style.position = 'relative';
                
                // Badge de promoção
                if (produto.precoPromo && Number(produto.precoPromo) < Number(produto.preco)) {
                    var badge = document.createElement('div');
                    badge.className = 'badge-promo';
                    var desconto = Math.round((1 - Number(produto.precoPromo) / Number(produto.preco)) * 100);
                    badge.textContent = '-' + desconto + '%';
                    card.appendChild(badge);
                }
                
                // Imagem
                if (produto.imagem) {
                    var img = document.createElement('img');
                    img.src = produto.imagem;
                    img.alt = produto.nome;
                    img.style.width = '100%';
                    img.style.height = '200px';
                    img.style.objectFit = 'cover';
                    img.style.borderRadius = '10px';
                    img.style.marginBottom = '1rem';
                    img.style.display = 'block';
                    card.appendChild(img);
                } else {
                    var placeholder = document.createElement('div');
                    placeholder.className = 'produto-imagem';
                    placeholder.textContent = produto.emoji || '📦';
                    card.appendChild(placeholder);
                }
                
                // Categoria
                if (produto.categoria) {
                    var cat = document.createElement('div');
                    cat.className = 'produto-categoria';
                    cat.textContent = produto.categoria;
                    card.appendChild(cat);
                }
                
                // Nome
                var nome = document.createElement('h3');
                nome.className = 'produto-nome';
                nome.textContent = produto.nome;
                card.appendChild(nome);
                
                // Preço
                var precoDiv = document.createElement('div');
                precoDiv.className = 'produto-preco';
                
                if (produto.precoPromo && Number(produto.precoPromo) < Number(produto.preco)) {
                    precoDiv.innerHTML = '<span class="produto-preco-original">R$ ' + Number(produto.preco).toFixed(2) + '</span>' +
                                        '<span class="produto-preco-promo">R$ ' + Number(produto.precoPromo).toFixed(2) + '</span>';
                } else {
                    precoDiv.textContent = 'R$ ' + Number(produto.preco).toFixed(2);
                }
                card.appendChild(precoDiv);
                
                // Botão Comprar
                var btnComprar = document.createElement('button');
                btnComprar.className = 'btn-comprar';
                btnComprar.textContent = '🛒 Comprar';
                btnComprar.onclick = (function(produtoId) {
                    return function() { adicionarAoCarrinho(produtoId); };
                })(produto.id);
                card.appendChild(btnComprar);
                
                // Botão Detalhes
                if (produto.descricao && produto.descricao.trim() !== '') {
                    var btnDetalhes = document.createElement('button');
                    btnDetalhes.className = 'btn-detalhes';
                    btnDetalhes.textContent = '📋 Detalhes';
                    btnDetalhes.onclick = (function(produtoId) {
                        return function() { mostrarDetalhes(produtoId); };
                    })(produto.id);
                    card.appendChild(btnDetalhes);
                }
                
                container.appendChild(card);
            });
        }

        renderizarProdutos();
        atualizarContador();
    </script>
</body>
</html>
