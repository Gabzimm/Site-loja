<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyCraft Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilo para imagem do produto se moldar ao card */
        .produto-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <h1>🛒 ReyCraft Shop</h1>
        </div>
        <nav class="nav">
            <a href="index.html">🏠 Home</a>
            <a href="carrinho.html">🛒 Carrinho <span id="contador-carrinho">(0)</span></a>
        </nav>
    </header>

    <!-- PRODUTOS -->
    <div class="container">
        <h2>🔥 Produtos em Destaque</h2>
        
        <div class="grid-produtos" id="lista-produtos">
            <!-- Produtos carregados via JavaScript -->
        </div>
    </div>

    <!-- BOTÃO ADMIN -->
    <a href="admin/login.html" class="btn-admin">⚙️ Admin</a>

    <script>
        // ========== APLICAR CORES PERSONALIZADAS ==========
        (function() {
            try {
                var config = JSON.parse(localStorage.getItem('config_loja'));
                
                if (config && config.corRoxo) {
                    var style = document.createElement('style');
                    style.id = 'cores-personalizadas';
                    style.textContent = 
                        ':root {' +
                        '--roxo: ' + config.corRoxo + ' !important;' +
                        '--roxo-escuro: ' + config.corRoxo + 'cc !important;' +
                        '--roxo-claro: ' + config.corRoxo + '99 !important;' +
                        '--verde: ' + config.corVerde + ' !important;' +
                        '--verde-escuro: ' + config.corVerde + 'cc !important;' +
                        '--verde-claro: ' + config.corVerde + '99 !important;' +
                        '--amarelo: ' + config.corAmarelo + ' !important;' +
                        '--amarelo-escuro: ' + config.corAmarelo + 'cc !important;' +
                        '--amarelo-claro: ' + config.corAmarelo + '99 !important;' +
                        '}';
                    document.head.appendChild(style);
                    
                    if (config.bgImagem) {
                        var fundo = document.createElement('div');
                        fundo.id = 'fundo-customizado';
                        fundo.style.cssText = 
                            'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;' +
                            'background-image:url(' + config.bgImagem + ');' +
                            'background-size:' + (config.bgModo || 'cover') + ';' +
                            'background-position:' + (config.bgPosicao || 'center') + ';' +
                            'background-repeat:' + (config.bgModo === 'repeat' ? 'repeat' : 'no-repeat') + ';' +
                            'opacity:' + ((config.bgOpacidade || 50) / 100) + ';';
                        document.body.insertBefore(fundo, document.body.firstChild);
                    }
                    
                    if (config.favicon) {
                        var link = document.createElement('link');
                        link.rel = 'icon';
                        link.href = config.favicon;
                        document.head.appendChild(link);
                    }
                }
            } catch(e) {}
        })();

        // ========== PRODUTOS ==========
        var produtos = JSON.parse(localStorage.getItem('produtos')) || [];

        // ========== CARRINHO ==========
        var carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

        function salvarCarrinho() {
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarContador();
        }

        function adicionarAoCarrinho(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            
            if (!produto) {
                alert('Produto não encontrado!');
                return;
            }
            
            var itemNoCarrinho = carrinho.find(function(item) { return item.id === id; });
            
            if (itemNoCarrinho) {
                itemNoCarrinho.quantidade++;
            } else {
                carrinho.push({ 
                    id: produto.id,
                    nome: produto.nome,
                    preco: produto.preco,
                    emoji: produto.emoji || '',
                    imagem: produto.imagem || '',
                    quantidade: 1 
                });
            }
            
            salvarCarrinho();
            alert(produto.nome + ' adicionado ao carrinho! 🛒');
        }

        function atualizarContador() {
            var total = 0;
            carrinho.forEach(function(item) {
                total += item.quantidade;
            });
            var contador = document.getElementById('contador-carrinho');
            if (contador) contador.textContent = '(' + total + ')';
        }

        // ========== RENDERIZAR PRODUTOS ==========
        function renderizarProdutos() {
            var container = document.getElementById('lista-produtos');
            if (!container) return;
            
            if (produtos.length === 0) {
                container.innerHTML = '<div class="loja-vazia" style="grid-column: 1 / -1;"><div class="icone">📦</div><h2>Loja Vazia</h2><p>O administrador ainda não adicionou produtos.</p><p style="margin-top: 0.5rem;">Volte em breve! 🚀</p></div>';
                return;
            }
            
            var html = '';
            produtos.forEach(function(produto) {
                html += '<div class="produto-card">';
                
                // Imagem do produto (se molda ao quadrado)
                if (produto.imagem) {
                    html += '<img src="' + produto.imagem + '" class="produto-img" alt="' + produto.nome + '" onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'flex\';">';
                    html += '<div class="produto-imagem" style="display:none;">' + (produto.emoji || '📦') + '</div>';
                } else {
                    html += '<div class="produto-imagem">' + (produto.emoji || '📦') + '</div>';
                }
                
                html += '<h3 class="produto-nome">' + produto.nome + '</h3>';
                html += '<div class="produto-preco">R$ ' + parseFloat(produto.preco).toFixed(2) + '</div>';
                html += '<button class="btn-comprar" onclick="adicionarAoCarrinho(' + produto.id + ')">🛒 Comprar</button>';
                
                // Botão de detalhes
                if (produto.descricao && produto.descricao.trim() !== '') {
                    html += '<button class="btn-detalhes" onclick="mostrarDetalhes(' + produto.id + ')" style="width:100%;padding:0.6rem;background:transparent;border:1px solid var(--roxo);color:var(--texto);border-radius:8px;margin-top:0.5rem;cursor:pointer;transition:all 0.3s;" onmouseover="this.style.background=\'var(--roxo)\'" onmouseout="this.style.background=\'transparent\'">📋 Detalhes</button>';
                }
                
                html += '</div>';
            });
            container.innerHTML = html;
        }

        // Função para mostrar detalhes
        function mostrarDetalhes(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            if (!produto) return;
            
            var modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;';
            
            var imagemHtml = '';
            if (produto.imagem) {
                imagemHtml = '<img src="' + produto.imagem + '" style="width:100%;max-height:300px;object-fit:cover;border-radius:10px;margin-bottom:1rem;" alt="' + produto.nome + '">';
            } else if (produto.emoji) {
                imagemHtml = '<div style="font-size:5rem;margin-bottom:1rem;">' + produto.emoji + '</div>';
            }
            
            modal.innerHTML = '<div style="background:var(--card);padding:2rem;border-radius:15px;border:2px solid var(--roxo);max-width:500px;width:90%;text-align:center;max-height:90vh;overflow-y:auto;">' +
                imagemHtml +
                '<h2 style="color:var(--amarelo);margin-bottom:1rem;">' + produto.nome + '</h2>' +
                '<p style="color:var(--texto);line-height:1.8;font-size:1.1rem;">' + (produto.descricao || 'Sem descrição') + '</p>' +
                '<div style="color:var(--verde);font-size:1.5rem;font-weight:bold;margin-top:1rem;">R$ ' + parseFloat(produto.preco).toFixed(2) + '</div>' +
                '<button onclick="this.parentElement.parentElement.remove()" style="background:var(--roxo);color:white;padding:0.8rem 2rem;border:none;border-radius:8px;margin-top:1.5rem;cursor:pointer;font-size:1rem;font-weight:bold;">Fechar</button>' +
            '</div>';
            
            document.body.appendChild(modal);
            
            modal.onclick = function(e) {
                if (e.target === modal) modal.remove();
            };
        }

        // ========== INICIAR ==========
        renderizarProdutos();
        atualizarContador();
    </script>
</body>
</html>
