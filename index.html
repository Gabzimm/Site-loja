<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyCraft Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .produto-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        
        /* Modal fundo */
        .modal-detalhes-fundo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        /* Caixa maior preenchendo a tela */
        .modal-detalhes-box {
            background: var(--card, #1A1A2E);
            border: 2px solid var(--roxo, #8B5CF6);
            border-radius: 15px;
            padding: 2.5rem;
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-detalhes-titulo {
            color: var(--amarelo, #F59E0B);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .modal-detalhes-conteudo {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }
        
        .modal-detalhes-imagem {
            width: 350px;
            height: 350px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }
        
        .modal-detalhes-placeholder {
            width: 350px;
            height: 350px;
            border-radius: 10px;
            background: linear-gradient(45deg, var(--roxo, #8B5CF6), var(--verde, #10B981));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            flex-shrink: 0;
        }
        
        .modal-detalhes-texto {
            color: var(--texto, #E2E8F0);
            font-size: 1.1rem;
            line-height: 1.8;
            flex: 1;
            white-space: pre-line;
        }
        
        .modal-detalhes-rodape {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #333;
        }
        
        .modal-detalhes-preco {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--verde, #10B981);
        }
        
        .modal-detalhes-fechar {
            background: var(--roxo, #8B5CF6);
            color: white;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .modal-detalhes-fechar:hover {
            background: var(--roxo-escuro, #6D28D9);
            transform: scale(1.05);
        }
        
        @media (max-width: 700px) {
            .modal-detalhes-fundo {
                padding: 1rem;
            }
            
            .modal-detalhes-box {
                padding: 1.5rem;
            }
            
            .modal-detalhes-conteudo {
                flex-direction: column;
                align-items: center;
            }
            
            .modal-detalhes-imagem,
            .modal-detalhes-placeholder {
                width: 100%;
                height: 250px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1>🛒 ReyCraft Shop</h1>
        </div>
        <nav class="nav">
            <a href="index.html">🏠 Home</a>
            <a href="carrinho.html">🛒 Carrinho <span id="contador-carrinho">(0)</span></a>
        </nav>
    </header>

    <div class="container">
        <h2>🔥 Produtos em Destaque</h2>
        
        <div class="grid-produtos" id="lista-produtos"></div>
    </div>

    <a href="admin/login.html" class="btn-admin">⚙️ Admin</a>

    <script>
        // ========== CORES ==========
        (function() {
            try {
                var config = JSON.parse(localStorage.getItem('config_loja'));
                if (config && config.corRoxo) {
                    var style = document.createElement('style');
                    style.textContent = 
                        ':root {' +
                        '--roxo: ' + config.corRoxo + ' !important;' +
                        '--roxo-escuro: ' + config.corRoxo + 'cc !important;' +
                        '--verde: ' + config.corVerde + ' !important;' +
                        '--verde-escuro: ' + config.corVerde + 'cc !important;' +
                        '--amarelo: ' + config.corAmarelo + ' !important;' +
                        '--amarelo-escuro: ' + config.corAmarelo + 'cc !important;' +
                        '}';
                    document.head.appendChild(style);
                    
                    if (config.bgImagem) {
                        var fundo = document.createElement('div');
                        fundo.style.cssText = 
                            'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;' +
                            'background-image:url(' + config.bgImagem + ');' +
                            'background-size:' + (config.bgModo || 'cover') + ';' +
                            'background-position:' + (config.bgPosicao || 'center') + ';' +
                            'opacity:' + ((config.bgOpacidade || 50) / 100) + ';';
                        document.body.insertBefore(fundo, document.body.firstChild);
                    }
                    
                    if (config.favicon) {
                        var link = document.createElement('link');
                        link.rel = 'icon';
                        link.href = config.favicon;
                        document.head.appendChild(link);
                    }
                }
            } catch(e) {}
        })();

        // ========== DADOS ==========
        var produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        var carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

        function salvarCarrinho() {
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarContador();
        }

        function adicionarAoCarrinho(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            if (!produto) return;
            
            var item = carrinho.find(function(i) { return i.id === id; });
            if (item) {
                item.quantidade++;
            } else {
                carrinho.push({
                    id: produto.id,
                    nome: produto.nome,
                    preco: Number(produto.preco),
                    emoji: produto.emoji || '',
                    imagem: produto.imagem || '',
                    quantidade: 1
                });
            }
            
            salvarCarrinho();
            alert(produto.nome + ' adicionado ao carrinho! 🛒');
        }

        function atualizarContador() {
            var total = 0;
            carrinho.forEach(function(item) {
                total += item.quantidade;
            });
            var contador = document.getElementById('contador-carrinho');
            if (contador) contador.textContent = '(' + total + ')';
        }

        function mostrarDetalhes(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            if (!produto) return;
            
            var antigo = document.querySelector('.modal-detalhes-fundo');
            if (antigo) antigo.remove();
            
            var modal = document.createElement('div');
            modal.className = 'modal-detalhes-fundo';
            
            var imagemHtml = produto.imagem 
                ? '<img src="' + produto.imagem + '" class="modal-detalhes-imagem" alt="' + produto.nome + '">'
                : '<div class="modal-detalhes-placeholder">' + (produto.emoji || '📦') + '</div>';
            
            modal.innerHTML = 
                '<div class="modal-detalhes-box">' +
                    '<div class="modal-detalhes-titulo">' + produto.nome + '</div>' +
                    '<div class="modal-detalhes-conteudo">' +
                        imagemHtml +
                        '<div class="modal-detalhes-texto">' + (produto.descricao || 'Sem descrição.') + '</div>' +
                    '</div>' +
                    '<div class="modal-detalhes-rodape">' +
                        '<div class="modal-detalhes-preco">R$ ' + Number(produto.preco).toFixed(2) + '</div>' +
                        '<button class="modal-detalhes-fechar" onclick="this.closest(\'.modal-detalhes-fundo\').remove()">Fechar</button>' +
                    '</div>' +
                '</div>';
            
            document.body.appendChild(modal);
            modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
        }

        function renderizarProdutos() {
            var container = document.getElementById('lista-produtos');
            if (!container) return;
            
            if (produtos.length === 0) {
                container.innerHTML = '<div class="loja-vazia" style="grid-column: 1 / -1;"><div class="icone">📦</div><h2>Loja Vazia</h2><p>O administrador ainda não adicionou produtos.</p></div>';
                return;
            }
            
            var html = '';
            produtos.forEach(function(produto) {
                html += '<div class="produto-card">';
                
                if (produto.imagem) {
                    html += '<img src="' + produto.imagem + '" class="produto-img" alt="' + produto.nome + '">';
                } else {
                    html += '<div class="produto-imagem">' + (produto.emoji || '📦') + '</div>';
                }
                
                html += '<h3 class="produto-nome">' + produto.nome + '</h3>';
                html += '<div class="produto-preco">R$ ' + Number(produto.preco).toFixed(2) + '</div>';
                html += '<button class="btn-comprar" onclick="adicionarAoCarrinho(' + produto.id + ')">🛒 Comprar</button>';
                
                if (produto.descricao && produto.descricao.trim() !== '') {
                    html += '<button style="width:100%;padding:0.6rem;background:transparent;border:1px solid var(--roxo);color:var(--texto);border-radius:8px;margin-top:0.5rem;cursor:pointer;" onclick="mostrarDetalhes(' + produto.id + ')">📋 Detalhes</button>';
                }
                
                html += '</div>';
            });
            container.innerHTML = html;
        }

        renderizarProdutos();
        atualizarContador();
    </script>
</body>
</html>
