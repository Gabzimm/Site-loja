<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyCraft Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <h1>🛒 ReyCraft Shop</h1>
        </div>
        <nav class="nav">
            <a href="index.html">🏠 Home</a>
            <a href="carrinho.html">🛒 Carrinho <span id="contador-carrinho">(0)</span></a>
        </nav>
    </header>

    <!-- PRODUTOS -->
    <div class="container">
        <h2>🔥 Produtos em Destaque</h2>
        
        <div class="grid-produtos" id="lista-produtos">
            <!-- Produtos carregados via JavaScript -->
        </div>
    </div>

    <!-- BOTÃO ADMIN -->
    <a href="admin/login.html" class="btn-admin">⚙️ Admin</a>

    <script>
        // ========== APLICAR CORES PERSONALIZADAS ==========
        (function() {
            try {
                var config = JSON.parse(localStorage.getItem('config_loja'));
                
                if (config && config.corRoxo) {
                    var style = document.createElement('style');
                    style.id = 'cores-personalizadas';
                    style.textContent = 
                        ':root {' +
                        '--roxo: ' + config.corRoxo + ' !important;' +
                        '--roxo-escuro: ' + config.corRoxo + 'cc !important;' +
                        '--roxo-claro: ' + config.corRoxo + '99 !important;' +
                        '--verde: ' + config.corVerde + ' !important;' +
                        '--verde-escuro: ' + config.corVerde + 'cc !important;' +
                        '--verde-claro: ' + config.corVerde + '99 !important;' +
                        '--amarelo: ' + config.corAmarelo + ' !important;' +
                        '--amarelo-escuro: ' + config.corAmarelo + 'cc !important;' +
                        '--amarelo-claro: ' + config.corAmarelo + '99 !important;' +
                        '}';
                    document.head.appendChild(style);
                    
                    if (config.bgImagem) {
                        var fundo = document.createElement('div');
                        fundo.id = 'fundo-customizado';
                        fundo.style.cssText = 
                            'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;' +
                            'background-image:url(' + config.bgImagem + ');' +
                            'background-size:' + (config.bgModo || 'cover') + ';' +
                            'background-position:' + (config.bgPosicao || 'center') + ';' +
                            'background-repeat:' + (config.bgModo === 'repeat' ? 'repeat' : 'no-repeat') + ';' +
                            'opacity:' + ((config.bgOpacidade || 50) / 100) + ';';
                        document.body.insertBefore(fundo, document.body.firstChild);
                    }
                    
                    if (config.favicon) {
                        var link = document.createElement('link');
                        link.rel = 'icon';
                        link.href = config.favicon;
                        document.head.appendChild(link);
                    }
                }
            } catch(e) {}
        })();

        // ========== PRODUTOS ==========
        var produtos = JSON.parse(localStorage.getItem('produtos')) || [];

        // ========== CARRINHO ==========
        var carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

        function salvarCarrinho() {
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarContador();
        }

        function adicionarAoCarrinho(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            var itemNoCarrinho = carrinho.find(function(item) { return item.id === id; });
            
            if (itemNoCarrinho) {
                itemNoCarrinho.quantidade++;
            } else {
                carrinho.push({ 
                    id: produto.id,
                    nome: produto.nome,
                    preco: produto.preco,
                    emoji: produto.emoji,
                    quantidade: 1 
                });
            }
            
            salvarCarrinho();
            alert(produto.nome + ' adicionado ao carrinho! 🛒');
        }

        function atualizarContador() {
            var total = 0;
            carrinho.forEach(function(item) {
                total += item.quantidade;
            });
            var contador = document.getElementById('contador-carrinho');
            if (contador) contador.textContent = '(' + total + ')';
        }

        function renderizarProdutos() {
            var container = document.getElementById('lista-produtos');
            if (!container) return;
            
            if (produtos.length === 0) {
                container.innerHTML = '<div class="loja-vazia" style="grid-column: 1 / -1;"><div class="icone">📦</div><h2>Loja Vazia</h2><p>O administrador ainda não adicionou produtos.</p><p style="margin-top: 0.5rem;">Volte em breve! 🚀</p></div>';
                return;
            }
            
            var html = '';
            produtos.forEach(function(produto) {
                html += '<div class="produto-card">';
                html += '<div class="produto-imagem">' + (produto.emoji || '📦') + '</div>';
                html += '<h3 class="produto-nome">' + produto.nome + '</h3>';
                html += '<p class="produto-descricao">' + (produto.descricao || '') + '</p>';
                html += '<div class="produto-preco">R$ ' + parseFloat(produto.preco).toFixed(2) + '</div>';
                html += '<button class="btn-comprar" onclick="adicionarAoCarrinho(' + produto.id + ')">🛒 Comprar</button>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        renderizarProdutos();
        atualizarContador();
    </script>
</body>
</html>
