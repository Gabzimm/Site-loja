<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyCraft Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Imagem do produto no card */
        .produto-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        
        /* Fundo escuro do modal */
        .modal-detalhes-fundo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Caixa retangular do modal */
        .modal-detalhes-box {
            background: var(--card, #1A1A2E);
            border: 2px solid var(--roxo, #8B5CF6);
            border-radius: 15px;
            padding: 2rem;
            max-width: 700px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        /* Título */
        .modal-detalhes-titulo {
            color: var(--amarelo, #F59E0B);
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
        }
        
        /* Container da imagem + descrição lado a lado */
        .modal-detalhes-conteudo {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }
        
        /* Imagem à esquerda */
        .modal-detalhes-imagem {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }
        
        /* Placeholder se não tiver imagem */
        .modal-detalhes-placeholder {
            width: 250px;
            height: 250px;
            border-radius: 10px;
            background: linear-gradient(45deg, var(--roxo, #8B5CF6), var(--verde, #10B981));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            flex-shrink: 0;
        }
        
        /* Descrição à direita */
        .modal-detalhes-texto {
            color: var(--texto, #E2E8F0);
            font-size: 1rem;
            line-height: 1.8;
            flex: 1;
        }
        
        /* Preço e botão */
        .modal-detalhes-rodape {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-detalhes-preco {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--verde, #10B981);
        }
        
        .modal-detalhes-fechar {
            background: var(--roxo, #8B5CF6);
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .modal-detalhes-fechar:hover {
            background: var(--roxo-escuro, #6D28D9);
        }
        
        /* Responsivo para celular */
        @media (max-width: 600px) {
            .modal-detalhes-conteudo {
                flex-direction: column;
                align-items: center;
            }
            
            .modal-detalhes-imagem,
            .modal-detalhes-placeholder {
                width: 100%;
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <h1>🛒 ReyCraft Shop</h1>
        </div>
        <nav class="nav">
            <a href="index.html">🏠 Home</a>
            <a href="carrinho.html">🛒 Carrinho <span id="contador-carrinho">(0)</span></a>
        </nav>
    </header>

    <!-- PRODUTOS -->
    <div class="container">
        <h2>🔥 Produtos em Destaque</h2>
        
        <div class="grid-produtos" id="lista-produtos">
            <!-- Produtos carregados via JavaScript -->
        </div>
    </div>

    <!-- BOTÃO ADMIN -->
    <a href="admin/login.html" class="btn-admin">⚙️ Admin</a>

    <script>
        // ========== APLICAR CORES PERSONALIZADAS ==========
        (function() {
            try {
                var config = JSON.parse(localStorage.getItem('config_loja'));
                
                if (config && config.corRoxo) {
                    var style = document.createElement('style');
                    style.id = 'cores-personalizadas';
                    style.textContent = 
                        ':root {' +
                        '--roxo: ' + config.corRoxo + ' !important;' +
                        '--roxo-escuro: ' + config.corRoxo + 'cc !important;' +
                        '--roxo-claro: ' + config.corRoxo + '99 !important;' +
                        '--verde: ' + config.corVerde + ' !important;' +
                        '--verde-escuro: ' + config.corVerde + 'cc !important;' +
                        '--verde-claro: ' + config.corVerde + '99 !important;' +
                        '--amarelo: ' + config.corAmarelo + ' !important;' +
                        '--amarelo-escuro: ' + config.corAmarelo + 'cc !important;' +
                        '--amarelo-claro: ' + config.corAmarelo + '99 !important;' +
                        '}';
                    document.head.appendChild(style);
                    
                    if (config.bgImagem) {
                        var fundo = document.createElement('div');
                        fundo.id = 'fundo-customizado';
                        fundo.style.cssText = 
                            'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;' +
                            'background-image:url(' + config.bgImagem + ');' +
                            'background-size:' + (config.bgModo || 'cover') + ';' +
                            'background-position:' + (config.bgPosicao || 'center') + ';' +
                            'background-repeat:' + (config.bgModo === 'repeat' ? 'repeat' : 'no-repeat') + ';' +
                            'opacity:' + ((config.bgOpacidade || 50) / 100) + ';';
                        document.body.insertBefore(fundo, document.body.firstChild);
                    }
                    
                    if (config.favicon) {
                        var link = document.createElement('link');
                        link.rel = 'icon';
                        link.href = config.favicon;
                        document.head.appendChild(link);
                    }
                }
            } catch(e) {}
        })();

        // ========== PRODUTOS ==========
        var produtos = JSON.parse(localStorage.getItem('produtos')) || [];

        // ========== CARRINHO ==========
        var carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

        function salvarCarrinho() {
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarContador();
        }

        window.adicionarAoCarrinho = function(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            
            if (!produto) {
                alert('Produto não encontrado!');
                return;
            }
            
            var itemNoCarrinho = carrinho.find(function(item) { return item.id === id; });
            
            if (itemNoCarrinho) {
                itemNoCarrinho.quantidade++;
            } else {
                carrinho.push({ 
                    id: produto.id,
                    nome: produto.nome,
                    preco: produto.preco,
                    emoji: produto.emoji || '',
                    imagem: produto.imagem || '',
                    quantidade: 1 
                });
            }
            
            salvarCarrinho();
            alert(produto.nome + ' adicionado ao carrinho! 🛒');
        };

        function atualizarContador() {
            var total = 0;
            carrinho.forEach(function(item) {
                total += item.quantidade;
            });
            var contador = document.getElementById('contador-carrinho');
            if (contador) contador.textContent = '(' + total + ')';
        }

        // ========== MOSTRAR DETALHES (Modal Retangular) ==========
        window.mostrarDetalhes = function(id) {
            var produto = produtos.find(function(p) { return p.id === id; });
            if (!produto) return;
            
            // Remover modal antigo se existir
            var modalAntigo = document.querySelector('.modal-detalhes-fundo');
            if (modalAntigo) modalAntigo.remove();
            
            var modal = document.createElement('div');
            modal.className = 'modal-detalhes-fundo';
            
            // Imagem ou placeholder
            var imagemHtml = '';
            if (produto.imagem) {
                imagemHtml = '<img src="' + produto.imagem + '" class="modal-detalhes-imagem" alt="' + produto.nome + '">';
            } else {
                imagemHtml = '<div class="modal-detalhes-placeholder">' + (produto.emoji || '📦') + '</div>';
            }
            
            modal.innerHTML = 
                '<div class="modal-detalhes-box">' +
                    '<div class="modal-detalhes-titulo">' + produto.nome + '</div>' +
                    '<div class="modal-detalhes-conteudo">' +
                        imagemHtml +
                        '<div class="modal-detalhes-texto">' + (produto.descricao || 'Sem descrição disponível.') + '</div>' +
                    '</div>' +
                    '<div class="modal-detalhes-rodape">' +
                        '<div class="modal-detalhes-preco">R$ ' + parseFloat(produto.preco).toFixed(2) + '</div>' +
                        '<button class="modal-detalhes-fechar" onclick="this.closest(\'.modal-detalhes-fundo\').remove()">Fechar</button>' +
                    '</div>' +
                '</div>';
            
            document.body.appendChild(modal);
            
            // Fechar ao clicar fora
            modal.onclick = function(e) {
                if (e.target === modal) modal.remove();
            };
        };

        // ========== RENDERIZAR PRODUTOS ==========
        function renderizarProdutos() {
            var container = document.getElementById('lista-produtos');
            if (!container) return;
            
            if (produtos.length === 0) {
                container.innerHTML = '<div class="loja-vazia" style="grid-column: 1 / -1;"><div class="icone">📦</div><h2>Loja Vazia</h2><p>O administrador ainda não adicionou produtos.</p><p style="margin-top: 0.5rem;">Volte em breve! 🚀</p></div>';
                return;
            }
            
            var html = '';
            produtos.forEach(function(produto) {
                html += '<div class="produto-card">';
                
                // Imagem ou placeholder
                if (produto.imagem) {
                    html += '<img src="' + produto.imagem + '" class="produto-img" alt="' + produto.nome + '">';
                } else {
                    html += '<div class="produto-imagem">' + (produto.emoji || '📦') + '</div>';
                }
                
                html += '<h3 class="produto-nome">' + produto.nome + '</h3>';
                html += '<div class="produto-preco">R$ ' + parseFloat(produto.preco).toFixed(2) + '</div>';
                html += '<button class="btn-comprar" onclick="adicionarAoCarrinho(' + produto.id + ')">🛒 Comprar</button>';
                
                if (produto.descricao && produto.descricao.trim() !== '') {
                    html += '<button class="btn-detalhes" onclick="mostrarDetalhes(' + produto.id + ')" style="width:100%;padding:0.6rem;background:transparent;border:1px solid var(--roxo);color:var(--texto);border-radius:8px;margin-top:0.5rem;cursor:pointer;transition:all 0.3s;" onmouseover="this.style.background=\'var(--roxo)\'" onmouseout="this.style.background=\'transparent\'">📋 Detalhes</button>';
                }
                
                html += '</div>';
            });
            container.innerHTML = html;
        }

        // ========== INICIAR ==========
        renderizarProdutos();
        atualizarContador();
    </script>
</body>
</html>
