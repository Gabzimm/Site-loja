<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pedidos</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--card);
            padding: 2rem 1rem;
            border-right: 2px solid var(--roxo);
        }

        .sidebar h2 {
            color: var(--roxo);
            margin-bottom: 2rem;
            text-align: center;
            font-size: 1.3rem;
        }

        .sidebar nav a {
            display: block;
            padding: 1rem;
            color: var(--texto);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.ativo {
            background: var(--roxo);
            color: white;
        }

        .content {
            flex: 1;
            padding: 2rem;
        }

        .filtros {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filtro-btn {
            padding: 0.5rem 1rem;
            background: var(--card);
            border: 2px solid var(--roxo);
            border-radius: 8px;
            color: var(--texto);
            cursor: pointer;
            transition: all 0.3s;
        }

        .filtro-btn:hover,
        .filtro-btn.ativo {
            background: var(--roxo);
            color: white;
        }

        .tabela-pedidos {
            background: var(--card);
            border-radius: 10px;
            padding: 1rem;
            overflow-x: auto;
        }

        .tabela-pedidos table {
            width: 100%;
            border-collapse: collapse;
        }

        .tabela-pedidos th {
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid var(--roxo);
            color: var(--amarelo);
        }

        .tabela-pedidos td {
            padding: 1rem;
            border-bottom: 1px solid #333;
        }

        .status {
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .status-pendente {
            background: rgba(245, 158, 11, 0.2);
            color: var(--amarelo);
        }

        .status-confirmado {
            background: rgba(16, 185, 129, 0.2);
            color: var(--verde);
        }

        .status-entregue {
            background: rgba(139, 92, 246, 0.2);
            color: var(--roxo);
        }

        .btn-confirmar {
            background: var(--verde);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-confirmar:hover {
            background: var(--verde-escuro);
        }

        .sem-pedidos {
            text-align: center;
            padding: 3rem;
            color: var(--texto-cinza);
        }

        @media (max-width: 768px) {
            .admin-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid var(--roxo);
            }
            .sidebar nav {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .sidebar nav a {
                flex: 1;
                text-align: center;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <h2>⚙️ Admin</h2>
            <nav>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="produtos.html">📦 Produtos</a>
                <a href="pedidos.html" class="ativo">📋 Pedidos</a>
                <a href="cupons.html">🏷️ Cupons</a>
                <a href="configuracoes.html">🎨 Configurações</a>
                <a href="#" onclick="sair()">🚪 Sair</a>
            </nav>
        </aside>

        <main class="content">
            <h1>📋 Gerenciar Pedidos</h1>
            
            <div class="filtros">
                <button class="filtro-btn ativo" onclick="filtrarPedidos('todos')">📋 Todos</button>
                <button class="filtro-btn" onclick="filtrarPedidos('pendente')">⏳ Pendentes</button>
                <button class="filtro-btn" onclick="filtrarPedidos('confirmado')">✅ Confirmados</button>
                <button class="filtro-btn" onclick="filtrarPedidos('entregue')">📦 Entregues</button>
            </div>

            <div class="tabela-pedidos">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Valor</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-pedidos"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        if (!localStorage.getItem('admin_logado')) {
            window.location.href = 'login.html';
        }

        function sair() {
            localStorage.removeItem('admin_logado');
            window.location.href = 'login.html';
        }

        var pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
        var filtroAtual = 'todos';

        function salvarPedidos() {
            localStorage.setItem('pedidos', JSON.stringify(pedidos));
            renderizarPedidos();
        }

        function filtrarPedidos(status) {
            filtroAtual = status;
            document.querySelectorAll('.filtro-btn').forEach(function(btn) {
                btn.classList.remove('ativo');
            });
            event.target.classList.add('ativo');
            renderizarPedidos();
        }

        function confirmarPedido(id) {
            var pedido = pedidos.find(function(p) { return p.id === id; });
            if (pedido && pedido.status === 'pendente') {
                if (confirm('Deseja confirmar o pedido #' + id + '?\nO cliente receberá uma DM no Discord.')) {
                    pedido.status = 'confirmado';
                    salvarPedidos();
                    alert('✅ Pedido #' + id + ' confirmado!');
                }
            }
        }

        function renderizarPedidos() {
            var tbody = document.getElementById('lista-pedidos');
            if (!tbody) return;

            var pedidosFiltrados = filtroAtual === 'todos' 
                ? pedidos 
                : pedidos.filter(function(p) { return p.status === filtroAtual; });

            if (pedidosFiltrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="sem-pedidos">📋 Nenhum pedido encontrado</td></tr>';
                return;
            }

            tbody.innerHTML = pedidosFiltrados.map(function(pedido) {
                return '<tr>' +
                    '<td>#' + pedido.id + '</td>' +
                    '<td>' + pedido.cliente + '</td>' +
                    '<td>R$ ' + parseFloat(pedido.valor).toFixed(2) + '</td>' +
                    '<td>' + pedido.data + '</td>' +
                    '<td><span class="status status-' + pedido.status + '">' + pedido.status + '</span></td>' +
                    '<td>' +
                        (pedido.status === 'pendente' 
                            ? '<button class="btn-confirmar" onclick="confirmarPedido(' + pedido.id + ')">✅ Confirmar</button>'
                            : '—') +
                    '</td>' +
                '</tr>';
            }).join('');
        }

        renderizarPedidos();
    </script>
</body>
</html>
