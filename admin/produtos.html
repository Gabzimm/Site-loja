<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Produtos</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--card);
            padding: 2rem 1rem;
            border-right: 2px solid var(--roxo);
        }

        .sidebar h2 {
            color: var(--roxo);
            margin-bottom: 2rem;
            text-align: center;
            font-size: 1.3rem;
        }

        .sidebar nav a {
            display: block;
            padding: 1rem;
            color: var(--texto);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.ativo {
            background: var(--roxo);
            color: white;
        }

        .content {
            flex: 1;
            padding: 2rem;
        }

        .btn-adicionar {
            background: var(--verde);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }

        .btn-adicionar:hover {
            background: var(--verde-escuro);
            transform: scale(1.05);
        }
