<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--card);
            padding: 2rem 1rem;
            border-right: 2px solid var(--roxo);
        }

        .sidebar h2 {
            color: var(--roxo);
            margin-bottom: 2rem;
            text-align: center;
        }

        .sidebar nav a {
            display: block;
            padding: 1rem;
            color: var(--texto);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.ativo {
            background: var(--roxo);
            color: white;
        }

        .content {
            flex: 1;
            padding: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 4px solid var(--roxo);
        }

        .stat-card h3 {
            color: var(--texto-cinza);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-card .valor {
            font-size: 2rem;
            font-weight: bold;
            color: var(--amarelo);
        }

        .acoes-rapidas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .acao-btn {
            padding: 1.5rem;
            background: var(--card);
            border: 2px solid var(--roxo);
            border-radius: 10px;
            color: var(--texto);
            text-decoration: none;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
        }

        .acao-btn:hover {
            background: var(--roxo);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>⚙️ Admin</h2>
            <nav>
                <a href="dashboard.html" class="ativo">📊 Dashboard</a>
                <a href="produtos.html">📦 Produtos</a>
                <a href="pedidos.html">📋 Pedidos</a>
                <a href="cupons.html">🏷️ Cupons</a>
                <a href="#" onclick="sair()">🚪 Sair</a>
            </nav>
        </aside>

        <!-- CONTEÚDO -->
        <main class="content">
            <h1>📊 Dashboard</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>📦 Produtos</h3>
                    <div class="valor" id="total-produtos">0</div>
                </div>
                <div class="stat-card">
                    <h3>📋 Pedidos Hoje</h3>
                    <div class="valor" id="pedidos-hoje">0</div>
                </div>
                <div class="stat-card">
                    <h3>💰 Faturamento</h3>
                    <div class="valor" id="faturamento">R$ 0</div>
                </div>
                <div class="stat-card">
                    <h3>🏷️ Cupons Ativos</h3>
                    <div class="valor" id="cupons-ativos">0</div>
                </div>
            </div>

            <h2>⚡ Ações Rápidas</h2>
            <div class="acoes-rapidas">
                <a href="produtos.html" class="acao-btn">➕ Novo Produto</a>
                <a href="cupons.html" class="acao-btn">🏷️ Criar Cupom</a>
                <a href="pedidos.html" class="acao-btn">📋 Ver Pedidos</a>
                <a href="../index.html" class="acao-btn">🏪 Ver Loja</a>
            </div>
        </main>
    </div>

    <script>
        // Verificar se está logado
        if (!localStorage.getItem('admin_logado')) {
            window.location.href = 'login.html';
        }

        function sair() {
            localStorage.removeItem('admin_logado');
            window.location.href = 'login.html';
        }

        // Dados mockados (depois conectamos na API)
        document.getElementById('total-produtos').textContent = '6';
        document.getElementById('pedidos-hoje').textContent = '3';
        document.getElementById('faturamento').textContent = 'R$ 349,50';
        document.getElementById('cupons-ativos').textContent = '2';
    </script>
</body>
</html>
