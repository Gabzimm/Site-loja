<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--card);
            padding: 2rem 1rem;
            border-right: 2px solid var(--roxo);
        }

        .sidebar h2 {
            color: var(--roxo);
            margin-bottom: 2rem;
            text-align: center;
            font-size: 1.3rem;
        }

        .sidebar nav a {
            display: block;
            padding: 1rem;
            color: var(--texto);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.ativo {
            background: var(--roxo);
            color: white;
        }

        .content {
            flex: 1;
            padding: 2rem;
        }

        .content h1 {
            margin-bottom: 2rem;
            color: var(--amarelo);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 4px solid var(--roxo);
        }

        .stat-card h3 {
            color: var(--texto-cinza);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-card .valor {
            font-size: 2rem;
            font-weight: bold;
            color: var(--amarelo);
        }

        .acoes-rapidas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .acao-btn {
            padding: 1.5rem;
            background: var(--card);
            border: 2px solid var(--roxo);
            border-radius: 10px;
            color: var(--texto);
            text-decoration: none;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
        }

        .acao-btn:hover {
            background: var(--roxo);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .admin-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid var(--roxo);
            }
            .sidebar nav {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .sidebar nav a {
                flex: 1;
                text-align: center;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>⚙️ Admin</h2>
            <nav>
                <a href="dashboard.html" class="ativo">📊 Dashboard</a>
                <a href="produtos.html">📦 Produtos</a>
                <a href="pedidos.html">📋 Pedidos</a>
                <a href="cupons.html">🏷️ Cupons</a>
                <a href="#" onclick="sair()">🚪 Sair</a>
            </nav>
        </aside>

        <!-- CONTEÚDO -->
        <main class="content">
            <h1>📊 Dashboard</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>📦 Produtos</h3>
                    <div class="valor" id="total-produtos">0</div>
                </div>
                <div class="stat-card">
                    <h3>📋 Pedidos</h3>
                    <div class="valor" id="total-pedidos">0</div>
                </div>
                <div class="stat-card">
                    <h3>⏳ Pendentes</h3>
                    <div class="valor" id="pedidos-pendentes">0</div>
                </div>
                <div class="stat-card">
                    <h3>🏷️ Cupons Ativos</h3>
                    <div class="valor" id="cupons-ativos">0</div>
                </div>
            </div>

            <h2 style="margin-bottom: 1rem;">⚡ Ações Rápidas</h2>
            <div class="acoes-rapidas">
                <a href="produtos.html" class="acao-btn">➕<br>Novo Produto</a>
                <a href="cupons.html" class="acao-btn">🏷️<br>Criar Cupom</a>
                <a href="pedidos.html" class="acao-btn">📋<br>Ver Pedidos</a>
                <a href="../index.html" class="acao-btn">🏪<br>Ver Loja</a>
            </div>
        </main>
    </div>

    <script>
        if (!localStorage.getItem('admin_logado')) {
            window.location.href = 'login.html';
        }

        function sair() {
            localStorage.removeItem('admin_logado');
            window.location.href = 'login.html';
        }

        // Atualizar estatísticas
        const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        const pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
        const cupons = JSON.parse(localStorage.getItem('cupons')) || [];

        document.getElementById('total-produtos').textContent = produtos.length;
        document.getElementById('total-pedidos').textContent = pedidos.length;
        document.getElementById('pedidos-pendentes').textContent = pedidos.filter(p => p.status === 'pendente').length;
        document.getElementById('cupons-ativos').textContent = cupons.filter(c => c.ativo).length;
    </script>
</body>
</html>
