<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 15px;
            border: 2px solid var(--roxo);
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--roxo);
            font-size: 2rem;
        }

        .login-container .subtitulo {
            text-align: center;
            color: var(--texto-cinza);
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--texto);
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            background: var(--fundo);
            border: 2px solid var(--roxo);
            border-radius: 8px;
            color: var(--texto);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--amarelo);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--roxo);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--roxo-escuro);
        }

        .erro-msg {
            color: #ef4444;
            text-align: center;
            margin-top: 1rem;
            display: none;
            font-weight: bold;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--amarelo);
            text-decoration: none;
        }

        .voltar:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Painel Admin</h2>
        <p class="subtitulo">Acesso restrito à administração</p>
        
        <form id="login-form">
            <div class="input-group">
                <label>👤 Usuário</label>
                <input type="text" id="usuario" placeholder="Digite o usuário" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>🔒 Senha</label>
                <input type="password" id="senha" placeholder="Digite a senha" required>
            </div>
            
            <button type="submit" class="btn-login">🚀 Entrar</button>
        </form>
        
        <div class="erro-msg" id="erro-msg">❌ Usuário ou senha incorretos!</div>
        <a href="../index.html" class="voltar">← Voltar para loja</a>
    </div>

    <script>
        // ⚙️ CONFIGURE AQUI SUAS CREDENCIAIS
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'reycraft2024';
        
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            const erroMsg = document.getElementById('erro-msg');
            
            if (usuario === ADMIN_USER && senha === ADMIN_PASS) {
                localStorage.setItem('admin_logado', 'true');
                window.location.href = 'dashboard.html';
            } else {
                erroMsg.style.display = 'block';
                setTimeout(() => erroMsg.style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
