<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - ReyCraft Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --roxo: #8B5CF6; --verde: #10B981; --amarelo: #F59E0B;
            --fundo: #0a0a0f; --card: #14141f; --texto: #E2E8F0; --texto-cinza: #94A3B8;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--fundo); color: var(--texto);
            min-height: 100vh;
        }
        
        .header {
            background: #0a0a0f; padding: 0.8rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1e1e2e;
        }
        .header-logo img { height: 40px; }
        .header-voltar { color: var(--amarelo); text-decoration: none; font-weight: bold; }
        
        .perfil-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        
        .perfil-header {
            background: var(--card); border-radius: 15px; padding: 2rem;
            display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem;
        }
        .perfil-avatar {
            width: 90px; height: 90px; border-radius: 50%;
            border: 3px solid var(--amarelo); object-fit: cover;
        }
        .perfil-info h1 { font-size: 1.5rem; margin-bottom: 0.3rem; }
        .perfil-info .tag { color: var(--amarelo); font-size: 0.9rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: var(--card); padding: 1.3rem; border-radius: 10px;
            text-align: center; border: 1px solid #1e1e2e;
        }
        .stat-card .icone { font-size: 2rem; margin-bottom: 0.5rem; }
        .stat-card .valor { font-size: 1.5rem; font-weight: bold; color: var(--amarelo); }
        .stat-card .label { color: var(--texto-cinza); font-size: 0.8rem; }
        
        .perfil-secao {
            background: var(--card); padding: 1.5rem; border-radius: 10px;
            margin-bottom: 1rem; border: 1px solid #1e1e2e;
        }
        .perfil-secao h3 { color: var(--amarelo); margin-bottom: 1rem; }
        
        .btn-sair {
            background: #ef4444; color: white; padding: 0.8rem 2rem;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
            width: 100%; margin-top: 1rem;
        }
        .btn-login-discord {
            background: #5865F2; color: white; padding: 1rem 2rem;
            border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="header-voltar">← Voltar</a>
        <a href="index.html" class="header-logo">
            <img src="https://i.imgur.com/TneGRwW.png" alt="ReyCraft">
        </a>
        <div></div>
    </header>

    <div class="perfil-container" id="perfil-content"></div>

    <script>
        var DISCORD_CLIENT_ID = 'SEU_CLIENT_ID_AQUI';
        var REDIRECT_URI = 'https://reycraft-hc.shop/callback.html';
        var usuario = JSON.parse(localStorage.getItem('usuario_discord'));

        function loginDiscord() {
            var url = 'https://discord.com/api/oauth2/authorize?client_id=' + DISCORD_CLIENT_ID + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) + '&response_type=code&scope=identify';
            localStorage.setItem('redirect_after_login', 'perfil.html');
            window.location.href = url;
        }

        function sair() {
            localStorage.removeItem('usuario_discord');
            window.location.reload();
        }

        function carregarPerfil() {
            var c = document.getElementById('perfil-content');
            if (!usuario) {
                c.innerHTML = '<div style="text-align:center;padding:4rem;"><div style="font-size:5rem;">🔒</div><h2>Faça login</h2><p style="color:var(--texto-cinza);margin:1rem 0 2rem;">Conecte com Discord para ver seu perfil</p><button class="btn-login-discord" onclick="loginDiscord()">Login com Discord</button></div>';
                return;
            }
            
            var pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
            var meusPedidos = pedidos.filter(function(p) { return p.discordId === usuario.id; });
            var totalGasto = meusPedidos.reduce(function(t, p) { return t + Number(p.valor); }, 0);
            
            c.innerHTML = 
                '<div class="perfil-header">' +
                    '<img src="' + usuario.avatar + '" class="perfil-avatar" alt="Avatar">' +
                    '<div class="perfil-info">' +
                        '<h1>' + (usuario.global_name || usuario.username) + '</h1>' +
                        '<p class="tag">@' + usuario.username + '</p>' +
                        '<p style="color:var(--texto-cinza);">ID: ' + usuario.id + '</p>' +
                    '</div>' +
                '</div>' +
                '<div class="stats-grid">' +
                    '<div class="stat-card"><div class="icone">🛒</div><div class="valor">' + meusPedidos.length + '</div><div class="label">Compras</div></div>' +
                    '<div class="stat-card"><div class="icone">💰</div><div class="valor">R$ ' + totalGasto.toFixed(2) + '</div><div class="label">Total Gasto</div></div>' +
                    '<div class="stat-card"><div class="icone">🏰</div><div class="valor">—</div><div class="label">Clan (via Bot)</div></div>' +
                    '<div class="stat-card"><div class="icone">🏆</div><div class="valor">—</div><div class="label">Rank (via Bot)</div></div>' +
                '</div>' +
                '<div class="perfil-secao"><h3>📋 Histórico</h3>' + 
                    (meusPedidos.length > 0 ? meusPedidos.map(function(p) {
                        return '<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #1e1e2e;"><span>🛒 #' + p.id + '</span><span>R$ ' + Number(p.valor).toFixed(2) + '</span><span style="color:var(--amarelo);">' + p.status + '</span><span style="color:var(--texto-cinza);">' + p.data + '</span></div>';
                    }).join('') : '<p style="color:var(--texto-cinza);">Nenhuma compra.</p>') +
                '</div>' +
                '<button class="btn-sair" onclick="sair()">🚪 Sair</button>';
        }

        carregarPerfil();
    </script>
</body>
</html>
