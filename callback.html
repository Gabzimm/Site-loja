<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectando...</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .callback-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid var(--roxo);
            border-top-color: var(--amarelo);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .callback-box {
            background: var(--card);
            padding: 3rem;
            border-radius: 15px;
            border: 2px solid var(--roxo);
            max-width: 500px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="callback-box">
            <div class="loader"></div>
            <h2 style="color: var(--amarelo);">Conectando ao Discord...</h2>
            <p id="status" style="color: var(--texto-cinza);">Aguarde um momento</p>
        </div>
    </div>

    <script>
        // ========== CONFIGURAÇÃO - PREENCHA AQUI ==========
        const DISCORD_CLIENT_ID = '1515464456719695952';
        const DISCORD_CLIENT_SECRET = 'jLc1P6yIT3xpM2BqPmK2qQs1OwSFL75u';
        const REDIRECT_URI = 'https://reycraft-hc.shop/callback.html';

        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (!code) {
                document.getElementById('status').textContent = '❌ Erro: Código não encontrado';
                document.getElementById('status').style.color = '#ef4444';
                return;
            }

            try {
                document.getElementById('status').textContent = '🔄 Verificando identidade...';
                
                // Trocar código por token de acesso
                const tokenResponse = await fetch('https://discord.com/api/oauth2/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        client_id: DISCORD_CLIENT_ID,
                        client_secret: DISCORD_CLIENT_SECRET,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                    }),
                });

                const tokenData = await tokenResponse.json();
                
                if (tokenData.error) {
                    throw new Error(tokenData.error_description || 'Erro ao obter token');
                }

                document.getElementById('status').textContent = '📡 Buscando seus dados...';

                // Buscar dados do usuário
                const userResponse = await fetch('https://discord.com/api/users/@me', {
                    headers: {
                        'Authorization': `Bearer ${tokenData.access_token}`,
                    },
                });

                const userData = await userResponse.json();

                if (userData.error) {
                    throw new Error(userData.error_description || 'Erro ao buscar usuário');
                }

                // Salvar dados do usuário
                const usuario = {
                    id: userData.id,
                    username: userData.username,
                    discriminator: userData.discriminator || '0',
                    avatar: userData.avatar 
                        ? `https://cdn.discordapp.com/avatars/${userData.id}/${userData.avatar}.png?size=256`
                        : 'https://cdn.discordapp.com/embed/avatars/0.png?size=256',
                    global_name: userData.global_name || userData.username,
                    loggedAt: new Date().toISOString(),
                };

                localStorage.setItem('usuario_discord', JSON.stringify(usuario));
                
                document.getElementById('status').textContent = '✅ Login realizado com sucesso! Redirecionando...';
                document.getElementById('status').style.color = '#10B981';
                
                // Redirecionar de volta para a página anterior
                setTimeout(() => {
                    var redirect = localStorage.getItem('redirect_after_login') || 'perfil.html';
                    localStorage.removeItem('redirect_after_login');
                    window.location.href = redirect;
                }, 1500);

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('status').textContent = '❌ Erro: ' + error.message;
                document.getElementById('status').style.color = '#ef4444';
                
                // Botão para tentar novamente
                setTimeout(() => {
                    document.getElementById('status').innerHTML = 
                        '❌ Erro: ' + error.message + 
                        '<br><br><a href="perfil.html" style="color: var(--amarelo);">← Voltar e tentar novamente</a>';
                }, 2000);
            }
        }

        handleCallback();
    </script>
</body>
</html>
